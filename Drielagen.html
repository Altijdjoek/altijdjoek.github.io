<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drie Lagen Model Uitleg</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    #layers {
      display: flex;
      justify-content: space-around;
      margin-top: 20px;
    }

    .layer {
      text-align: center;
    }

    #output {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Drie Lagen Model</h1>
    <p>Uitleg over het toepassingslaag, fysieke laag en logische laag.</p>

    <div id="layers">
      <div class="layer">
        <h2>Toepassingslaag</h2>
        <p>De laag waar gebruikers direct mee interacteren.</p>
      </div>
      <div class="layer">
        <h2>Fysieke Laag</h2>
        <p>De hardwarecomponenten van het systeem.</p>
      </div>
      <div class="layer">
        <h2>Logische Laag</h2>
        <p>De algoritmen en processen die plaatsvinden.</p>
      </div>
    </div>

    <div id="output"></div>

    <script>
      // Voorbeeld van eenvoudige JavaScript-interactie
      const layers = document.getElementById('layers');
      const output = document.getElementById('output');

      layers.addEventListener('click', (event) => {
        if (event.target.classList.contains('layer')) {
          output.textContent = `Geselecteerde laag: ${event.target.querySelector('h2').textContent}`;
        }
      });
    </script>
  </div>
</body>
</html>
